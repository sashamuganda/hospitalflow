name: medflow_staff
description: MedFlow Staff — Hospital & Clinical Companion
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Navigation
  go_router: ^14.2.0
  
  # State Management
  provider: ^6.1.2
  
  # Fonts & Icons
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8
  
  # Charts / Graphs
  fl_chart: ^0.69.0
  
  # Calendar
  table_calendar: ^3.1.2
  
  # Local Storage
  shared_preferences: ^2.3.2
  
  # Animations & UI
  lottie: ^3.1.3
  shimmer: ^3.0.0
  
  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
